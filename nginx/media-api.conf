# =============================================================================
# Media Processing API - nginx Reverse Proxy Configuration
# =============================================================================
# OPTIONAL: Use this if you want to expose the API via nginx
#
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/media-api.conf
#   2. Create symlink: ln -s /etc/nginx/sites-available/media-api.conf /etc/nginx/sites-enabled/
#   3. Test config: nginx -t
#   4. Reload nginx: systemctl reload nginx
#
# NOTE: For internal n8n access, direct localhost:9300 is preferred.
#       Only use nginx if you need SSL or external access.
# =============================================================================

# Upstream definition
upstream media_api {
    server 127.0.0.1:9300;
    keepalive 32;
}

# HTTP server (redirect to HTTPS if using SSL)
server {
    listen 80;
    server_name media-api.yourdomain.com;

    # Uncomment for SSL redirect
    # return 301 https://$server_name$request_uri;

    # Comment out the location block below if using SSL redirect
    location / {
        proxy_pass http://media_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering for large responses (video files)
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Max upload size (for future endpoints)
        client_max_body_size 500M;
    }

    # Health check endpoint (for monitoring)
    location /health {
        proxy_pass http://media_api/health;
        proxy_http_version 1.1;
        access_log off;
    }
}

