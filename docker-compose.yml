version: '3.8'

services:
  media-api:
    build: .
    container_name: media-api
    ports:
      - "8000:8000"
    volumes:
      # Persist output files and job data
      - ./data:/data
    environment:
      # Reduce PyTorch memory usage
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    restart: unless-stopped
    # Resource limits for VPS with 2-4GB RAM
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    # Health check for monitoring
    # IMPORTANT: start_period=120s allows time for ML model loading (Whisper/Demucs)
    # Models can take 30-90 seconds to load on first startup, but the FastAPI
    # server starts immediately and /health endpoint returns 200 right away.
    # This ensures health checks pass during the startup window even while
    # models are still loading in the background.
    # Note: Using curl instead of Python httpx for consistency with production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
